name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check for version change
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if version tag exists
        id: check
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-release:
    name: Build ${{ matrix.name }}
    needs: check-version
    if: |
      (needs.check-version.result == 'success' && needs.check-version.outputs.should_release == 'true') ||
      (needs.check-version.result == 'skipped' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: torrenttui-linux-x86_64
            ext: ""
          - name: Linux aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: torrenttui-linux-aarch64
            ext: ""
          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: torrenttui-macos-x86_64
            ext: ""
          - name: macOS aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: torrenttui-macos-aarch64
            ext: ""
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torrenttui-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/torrenttui ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cp target/${{ matrix.target }}/release/torrenttui.exe ${{ matrix.artifact }}.exe
          Compress-Archive -Path "${{ matrix.artifact }}.exe" -DestinationPath "${{ matrix.artifact }}.zip"
          (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.artifact }}.zip" | Out-File "${{ matrix.artifact }}.zip.sha256" -Encoding ASCII

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          if-no-files-found: ignore

  create-macos-universal:
    name: Create macOS Universal Binary
    needs: build-release
    runs-on: macos-latest
    steps:
      - name: Download x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: torrenttui-macos-x86_64

      - name: Download aarch64 binary
        uses: actions/download-artifact@v8
        with:
          name: torrenttui-macos-aarch64

      - name: Extract and combine
        run: |
          tar xzf torrenttui-macos-x86_64.tar.gz
          mv torrenttui-macos-x86_64 torrenttui-x86_64
          tar xzf torrenttui-macos-aarch64.tar.gz
          mv torrenttui-macos-aarch64 torrenttui-aarch64
          lipo -create torrenttui-x86_64 torrenttui-aarch64 -output torrenttui-macos-universal
          chmod +x torrenttui-macos-universal
          tar czf torrenttui-macos-universal.tar.gz torrenttui-macos-universal
          shasum -a 256 torrenttui-macos-universal.tar.gz > torrenttui-macos-universal.tar.gz.sha256

      - name: Upload universal binary
        uses: actions/upload-artifact@v6
        with:
          name: torrenttui-macos-universal
          path: |
            torrenttui-macos-universal.tar.gz
            torrenttui-macos-universal.tar.gz.sha256

  publish-release:
    name: Publish Release
    needs: [check-version, build-release, create-macos-universal]
    if: always() && needs.build-release.result == 'success' && needs.create-macos-universal.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (if from main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from ${PREV_TAG} to HEAD"
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- Trigger release" || true)
          else
            echo "No previous tag found, using all commits"
            CHANGES=$(git log --pretty=format:"- %s" --no-merges | grep -v "^- Trigger release" || true)
          fi
          # Write to file to preserve formatting
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "## Installation"
            echo ""
            echo "Download the appropriate binary for your platform, extract it, and place it in your PATH."
            echo ""
            echo "**Linux (x86_64):**"
            echo "\`\`\`bash"
            echo "tar xzf torrenttui-linux-x86_64.tar.gz"
            echo "sudo mv torrenttui-linux-x86_64 /usr/local/bin/torrenttui"
            echo "\`\`\`"
            echo ""
            echo "**macOS (Universal):**"
            echo "\`\`\`bash"
            echo "tar xzf torrenttui-macos-universal.tar.gz"
            echo "sudo mv torrenttui-macos-universal /usr/local/bin/torrenttui"
            echo "\`\`\`"
            echo ""
            echo "**Windows:**"
            echo "Extract \`torrenttui-windows-x86_64.zip\` and add the directory to your PATH."
          } > changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: TorrentTUI ${{ steps.version.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
