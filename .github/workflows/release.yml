name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: torrenttui-linux-x86_64
            ext: ""
          - name: Linux aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: torrenttui-linux-aarch64
            ext: ""
          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: torrenttui-macos-x86_64
            ext: ""
          - name: macOS aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: torrenttui-macos-aarch64
            ext: ""
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torrenttui-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/torrenttui ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cp target/${{ matrix.target }}/release/torrenttui.exe ${{ matrix.artifact }}.exe
          Compress-Archive -Path "${{ matrix.artifact }}.exe" -DestinationPath "${{ matrix.artifact }}.zip"
          (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.artifact }}.zip" | Out-File "${{ matrix.artifact }}.zip.sha256" -Encoding ASCII

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          if-no-files-found: ignore

  create-macos-universal:
    name: Create macOS Universal Binary
    needs: build-release
    runs-on: macos-latest
    steps:
      - name: Download x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: torrenttui-macos-x86_64

      - name: Download aarch64 binary
        uses: actions/download-artifact@v8
        with:
          name: torrenttui-macos-aarch64

      - name: Extract and combine
        run: |
          tar xzf torrenttui-macos-x86_64.tar.gz
          mv torrenttui-macos-x86_64 torrenttui-x86_64
          tar xzf torrenttui-macos-aarch64.tar.gz
          mv torrenttui-macos-aarch64 torrenttui-aarch64
          lipo -create torrenttui-x86_64 torrenttui-aarch64 -output torrenttui-macos-universal
          chmod +x torrenttui-macos-universal
          tar czf torrenttui-macos-universal.tar.gz torrenttui-macos-universal
          shasum -a 256 torrenttui-macos-universal.tar.gz > torrenttui-macos-universal.tar.gz.sha256

      - name: Upload universal binary
        uses: actions/upload-artifact@v6
        with:
          name: torrenttui-macos-universal
          path: |
            torrenttui-macos-universal.tar.gz
            torrenttui-macos-universal.tar.gz.sha256

  publish-release:
    name: Publish Release
    needs: [build-release, create-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cat > notes.md << 'EOF'
          ## Installation

          Download the appropriate binary for your platform, extract it, and place it in your PATH.

          **Linux (x86_64):**
          ```bash
          tar xzf torrenttui-linux-x86_64.tar.gz
          sudo mv torrenttui-linux-x86_64 /usr/local/bin/torrenttui
          ```

          **macOS (Universal):**
          ```bash
          tar xzf torrenttui-macos-universal.tar.gz
          sudo mv torrenttui-macos-universal /usr/local/bin/torrenttui
          ```

          **Windows:**
          Extract `torrenttui-windows-x86_64.zip` and add the directory to your PATH.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TorrentTUI ${{ steps.notes.outputs.version }}
          body_path: notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
